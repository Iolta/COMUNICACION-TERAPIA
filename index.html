<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<title>Comunicación</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Source+Sans+3:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f0e;
    --surface: #1a1d1b;
    --border: #2e3330;
    --text: #e8ede9;
    --muted: #7a8a7e;
    --accent: #c8d8c2;
    --highlight: #e8c87a;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 8px;
    touch-action: manipulation;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  #log-btn {
    position: absolute;
    left: 0;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    -webkit-tap-highlight-color: transparent;
  }

  #nursing-btn {
    position: absolute;
    right: 0;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    -webkit-tap-highlight-color: transparent;
  }

  #attention-btn { color: var(--muted); border-color: #3a3f3c; }
  #attention-btn:active { border-color: var(--muted); }
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    flex: 1;
    min-height: 0;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 0 12px;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    line-height: 1.3;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:active { background: #252a27; border-color: var(--accent); }

  .custom-area {
    display: flex;
    gap: 8px;
    align-items: stretch;
    flex-shrink: 0;
    height: 64px;
  }
  .custom-area input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
  }
  .custom-area input:focus { border-color: var(--accent); }
  .custom-area input::placeholder { color: var(--muted); }
  .custom-area button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--accent);
    font-size: 22px;
    padding: 0 18px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Panels — shared base */
  .panel {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    flex-direction: column;
    padding: 16px;
    gap: 10px;
  }
  .panel.visible { display: flex; }

  #log-panel { background: var(--bg); }
  #nursing-panel { background: #0f1310; }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    flex-shrink: 0;
  }
  .panel-header span {
    font-family: 'Lora', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .panel-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Log list */
  #log-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .log-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    line-height: 1.4;
  }
  .log-entry.highlighted {
    border-color: var(--highlight);
    background: #1f1d13;
  }
  .log-entry.highlighted .log-msg { color: var(--highlight); font-weight: 600; }
  .log-entry.nursing {
    border-color: #5a9e78;
    background: #0f1a14;
  }
  .log-entry.nursing .log-msg { color: #5a9e78; font-weight: 600; }
  .log-time {
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 4px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .log-response {
    font-size: 16px;
    color: var(--text);
    margin-top: 4px;
    font-weight: 600;
  }
  #log-clear {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 13px;
    padding: 10px;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  /* Nursing grid */
  .nursing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    flex: 1;
    min-height: 0;
  }
  .nursing-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    line-height: 1.3;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.15s, border-color 0.15s;
  }
  .nursing-btn:active, .nursing-btn.tapped {
    background: #0f1a14;
    border-color: #5a9e78;
    color: #5a9e78;
  }

  /* Overlay */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #0a0c0b;
    z-index: 100;
  }
  #overlay.visible { display: block; }
  #overlay-text {
    font-family: 'Lora', serif;
    font-size: clamp(32px, 8vw, 64px);
    color: #e8ede9;
    text-align: center;
    line-height: 1.3;
    letter-spacing: 0.01em;
    max-width: 90vw;
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
  }
  #overlay-text.custom { top: 30%; }
  #overlay-response {
    display: none;
    position: absolute;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%);
    width: 85vw;
    gap: 8px;
    flex-direction: column;
    align-items: stretch;
  }
  #overlay-response.visible { display: flex; }
  #overlay-response input {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 18px;
    padding: 14px 16px;
    outline: none;
    text-align: center;
  }
  #overlay-response input::placeholder { color: var(--muted); }
  #overlay-response-answer {
    font-family: 'Lora', serif;
    font-size: clamp(28px, 7vw, 56px);
    color: var(--highlight);
    text-align: center;
    line-height: 1.3;
    min-height: 60px;
  }

  /* Edit modal */
  #edit-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  #edit-modal.visible { display: flex; }
  #edit-box {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 20px;
    width: 85vw;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #edit-box label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #edit-box input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 16px;
    padding: 12px 14px;
    outline: none;
  }
  #edit-box input:focus { border-color: var(--accent); }
  #edit-actions { display: flex; gap: 8px; }
  #edit-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #edit-confirm { background: var(--accent); color: var(--bg); font-weight: 600; border-color: var(--accent); }
  #edit-cancel { background: none; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <button id="log-btn">📋</button>
  <h1>Comunicación</h1>
  <button id="nursing-btn">✅</button>
</div>

<div class="grid">
  <div class="btn" data-msg="¿Cómo te llamás?" data-key="btn0">¿Cómo te llamás?</div>
  <div class="btn" data-msg="¿Qué vas a hacer?" data-key="btn1">¿Qué vas a hacer?</div>
  <div class="btn" data-msg="Temperatura" data-key="btn2">Temperatura</div>
  <div class="btn" data-msg="Luz" data-key="btn3">Luz</div>
  <div class="btn" data-msg="¿Podés llamar a la kinesióloga?" data-key="btn4">Llamar a kinesióloga</div>
  <div class="btn" data-msg="¿Podés llamar al médico?" data-key="btn5">Llamar al médico</div>
  <div id="attention-btn" class="btn">Timbre</div>
  <div class="btn" data-msg="Tengo dolor" data-key="btn7">Tengo dolor</div>
</div>

<div class="custom-area">
  <input id="custom-input" type="text" placeholder="Mensaje personalizado…" maxlength="200">
  <button id="send-custom">→</button>
</div>

<!-- Log panel -->
<div id="log-panel" class="panel">
  <div class="panel-header">
    <span>Historial</span>
    <button class="panel-close" id="log-close">✕</button>
  </div>
  <div id="log-list"></div>
  <button id="log-clear">Borrar historial</button>
</div>

<!-- Nursing panel -->
<div id="nursing-panel" class="panel">
  <div class="panel-header">
    <span>Enfermería</span>
    <button class="panel-close" id="nursing-close">✕</button>
  </div>
  <div class="nursing-grid">
    <div class="nursing-btn">Enfermería general</div>
    <div class="nursing-btn">Baño / Higiene</div>
    <div class="nursing-btn">Controles generales</div>
    <div class="nursing-btn">Cambio de posición</div>
    <div class="nursing-btn">Extracción de muestra</div>
    <div class="nursing-btn">Medicación</div>
    <div class="nursing-btn">Suero / Vía</div>
    <div class="nursing-btn">Control de signos</div>
  </div>
</div>

<!-- Message overlay -->
<div id="overlay">
  <div id="overlay-text"></div>
  <div id="overlay-response">
    <div id="overlay-response-answer"></div>
    <input id="overlay-response-input" type="text" placeholder="Escribí la respuesta…" maxlength="100">
  </div>
</div>

<!-- Edit modal -->
<div id="edit-modal">
  <div id="edit-box">
    <label>Editar botón (solo esta sesión)</label>
    <input id="edit-input" type="text" maxlength="80">
    <div id="edit-actions">
      <button id="edit-cancel">Cancelar</button>
      <button id="edit-confirm">Guardar</button>
    </div>
  </div>
</div>

<script>
  // Attention button - wood knock sound
  (function() {
    const btn = document.getElementById('attention-btn');
    function playKnock() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        const t = i / ctx.sampleRate;
        data[i] = Math.exp(-t * 40) * (Math.random() * 2 - 1) * 0.8;
      }
      const src = ctx.createBufferSource();
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 400;
      filter.Q.value = 0.8;
      src.buffer = buf;
      src.connect(filter);
      filter.connect(ctx.destination);
      src.start();
    }
    btn.addEventListener('click', () => {
      playKnock();
      setTimeout(playKnock, 180);
    });
  })();
    btn0: { label: '¿Cómo te llamás?',           msg: '¿Cómo te llamás?' },
    btn1: { label: '¿Qué vas a hacer?',           msg: '¿Qué vas a hacer?' },
    btn2: { label: 'Temperatura',                 msg: 'Temperatura' },
    btn3: { label: 'Luz',                         msg: 'Luz' },
    btn4: { label: 'Llamar a kinesióloga',        msg: '¿Podés llamar a la kinesióloga?' },
    btn5: { label: 'Llamar al médico',            msg: '¿Podés llamar al médico?' },
    btn6: { label: 'Necesito agua',               msg: 'Necesito agua' },
    btn7: { label: 'Tengo dolor',                 msg: 'Tengo dolor' }
  };
  const session = {};
  function getBtn(key) { return session[key] || DEFAULTS[key]; }
  function applyLabels() {
    document.querySelectorAll('.btn').forEach(btn => {
      const d = getBtn(btn.dataset.key);
      btn.textContent = d.label;
      btn.dataset.msg = d.msg;
    });
  }
  applyLabels();

  // Log
  let log = JSON.parse(localStorage.getItem('comm-log') || '[]');
  function saveLog() { localStorage.setItem('comm-log', JSON.stringify(log)); }
  function addLog(msg, response, isHighlight, isNursing) {
    const now = new Date();
    const time = now.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    const date = now.toLocaleDateString('es-AR');
    log.unshift({msg, response: response||null, time, date, highlight:!!isHighlight, nursing:!!isNursing});
    saveLog();
  }
  function renderLog() {
    const el = document.getElementById('log-list');
    if (!log.length) { el.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;margin-top:20px">Sin actividad aún</div>'; return; }
    el.innerHTML = log.map(e => `
      <div class="log-entry ${e.nursing?'nursing':e.highlight?'highlighted':''}">
        <div class="log-time">${e.date} — ${e.time}</div>
        <div class="log-msg">${e.msg}</div>
        ${e.response?`<div class="log-response">↩ ${e.response}</div>`:''}
      </div>`).join('');
  }

  // Panel helpers
  function openPanel(id) { document.getElementById(id).classList.add('visible'); }
  function closePanel(id) { document.getElementById(id).classList.remove('visible'); }

  document.getElementById('log-btn').addEventListener('click', () => { renderLog(); openPanel('log-panel'); });
  document.getElementById('log-close').addEventListener('click', () => closePanel('log-panel'));
  document.getElementById('log-clear').addEventListener('click', () => { log=[]; saveLog(); renderLog(); });
  document.getElementById('nursing-btn').addEventListener('click', () => openPanel('nursing-panel'));
  document.getElementById('nursing-close').addEventListener('click', () => closePanel('nursing-panel'));

  document.querySelectorAll('.nursing-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      addLog(btn.textContent, null, false, true);
      btn.classList.add('tapped');
      setTimeout(() => btn.classList.remove('tapped'), 600);
    });
  });

  // Overlay
  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlay-text');
  const overlayResponse = document.getElementById('overlay-response');
  const overlayResponseInput = document.getElementById('overlay-response-input');
  const overlayResponseAnswer = document.getElementById('overlay-response-answer');
  const customInput = document.getElementById('custom-input');
  const RESPONSE_KEYS = ['btn0','btn1'];
  let currentMsg = null, currentIsHighlight = false, alreadyLogged = false;

  function showMessage(msg, isCustom, isHighlight) {
    currentMsg = msg; currentIsHighlight = !!isHighlight; alreadyLogged = false;
    overlayText.textContent = msg;
    overlayText.classList.toggle('custom', !!isCustom);
    overlay.classList.add('visible');
    document.activeElement && document.activeElement.blur();
    if (isHighlight) {
      overlayResponseAnswer.textContent = '';
      overlayResponseInput.value = '';
      overlayResponse.classList.add('visible');
      setTimeout(() => overlayResponseInput.focus(), 100);
    } else {
      overlayResponse.classList.remove('visible');
      addLog(msg, null, false, false);
      alreadyLogged = true;
    }
  }

  overlayResponseInput.addEventListener('input', () => { overlayResponseAnswer.textContent = overlayResponseInput.value; });
  let blockOverlayClick = false;

  overlayResponseInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const v = overlayResponseInput.value.trim();
      addLog(currentMsg, v||null, true, false);
      alreadyLogged = true;
      blockOverlayClick = true;
      hideOverlay();
      setTimeout(() => blockOverlayClick = false, 300);
    }
  });
  overlayResponseInput.addEventListener('click', e => e.stopPropagation());

  function hideOverlay() {
    if (!alreadyLogged && currentIsHighlight) {
      const v = overlayResponseInput.value.trim();
      addLog(currentMsg, v||null, true, false);
    }
    overlay.classList.remove('visible');
    overlayResponse.classList.remove('visible');
    customInput.value = '';
  }
  overlay.addEventListener('click', () => { if (blockOverlayClick) return; hideOverlay(); });

  // Main buttons
  document.querySelectorAll('.btn').forEach(btn => {
    let pressTimer = null, didLong = false;
    btn.addEventListener('pointerdown', () => { didLong=false; pressTimer=setTimeout(()=>{didLong=true; openEditModal(btn);},600); });
    btn.addEventListener('pointerup', () => { clearTimeout(pressTimer); pressTimer=null; });
    btn.addEventListener('pointercancel', () => { clearTimeout(pressTimer); pressTimer=null; });
    btn.addEventListener('click', () => {
      if (didLong) return;
      const isHL = RESPONSE_KEYS.includes(btn.dataset.key);
      showMessage(btn.dataset.msg, false, isHL);
    });
  });

  // Custom send
  function sendCustom() { const v=customInput.value.trim(); if(v) showMessage(v,true,false); }
  document.getElementById('send-custom').addEventListener('click', sendCustom);
  customInput.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();sendCustom();} });
  customInput.addEventListener('input', () => { if(customInput.value.includes('\n')){customInput.value=customInput.value.replace(/\n/g,'');sendCustom();} });

  // Edit modal
  const editModal = document.getElementById('edit-modal');
  const editInput = document.getElementById('edit-input');
  let editingBtn = null;
  function openEditModal(btn) { editingBtn=btn; editInput.value=btn.textContent; editModal.classList.add('visible'); setTimeout(()=>editInput.focus(),100); }
  document.getElementById('edit-confirm').addEventListener('click', () => {
    if (editingBtn && editInput.value.trim()) { const v=editInput.value.trim(); session[editingBtn.dataset.key]={label:v,msg:v}; editingBtn.textContent=v; editingBtn.dataset.msg=v; }
    editModal.classList.remove('visible');
  });
  document.getElementById('edit-cancel').addEventListener('click', () => editModal.classList.remove('visible'));
</script>
</body>
</html>
