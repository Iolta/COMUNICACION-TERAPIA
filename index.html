<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Comunicación</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Source+Sans+3:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f0e;
    --surface: #1a1d1b;
    --border: #2e3330;
    --text: #e8ede9;
    --muted: #7a8a7e;
    --accent: #c8d8c2;
    --highlight: #e8c87a;
    --staff: #7a9be8;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 8px;
    touch-action: manipulation;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    flex: 1;
  }

  .header-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    -webkit-tap-highlight-color: transparent;
  }
  
  #tts-btn.active { color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    flex: 1;
    min-height: 0;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 0 12px;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    line-height: 1.3;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:active { background: #252a27; border-color: var(--accent); }
  .btn.timbre { color: var(--muted); border-color: #3a3f3c; }
  .btn.si { border-color: #5a9e78; color: #5a9e78; }
  .btn.no { border-color: #a65d5d; color: #a65d5d; }
  .btn.staff-opt { border-color: var(--border); color: var(--staff); }

  .custom-area {
    display: flex;
    gap: 8px;
    align-items: stretch;
    flex-shrink: 0;
    height: 64px;
  }
  .custom-area input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
  }
  .custom-area button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--accent);
    font-size: 22px;
    padding: 0 18px;
    cursor: pointer;
  }

  /* Paneles */
  .panel {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    flex-direction: column;
    padding: 16px;
    gap: 10px;
    background: var(--bg);
  }
  .panel.visible { display: flex; }
  
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  .panel-header span { font-family: 'Lora', serif; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  .panel-close { background: none; border: none; color: var(--muted); font-size: 20px; }

  #log-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .log-entry { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 15px; }
  .log-entry.nursing { border-color: #5a9e78; }
  .log-entry.staff { border-color: var(--staff); }
  .log-time { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .log-response { font-size: 16px; color: var(--highlight); margin-top: 4px; font-weight: 600; }
  
  .log-actions { display: flex; gap: 8px; margin-top: 10px; }
  .log-actions button { flex: 1; padding: 10px; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; font-size: 14px; cursor: pointer; }
  #log-export { color: var(--accent); border-color: var(--accent); }

  .nursing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    flex: 1;
    overflow-y: auto;
  }
  
  .staff-input-area {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .staff-input-area input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--staff);
    border-radius: 10px;
    color: var(--text);
    padding: 12px;
    font-size: 16px;
    outline: none;
  }

  /* Overlay */
  #overlay { display: none; position: fixed; inset: 0; background: #0a0c0b; z-index: 600; }
  #overlay.visible { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #overlay-text {
    font-family: 'Lora', serif;
    font-size: clamp(32px, 8vw, 64px);
    color: #e8ede9;
    text-align: center;
    padding: 20px;
  }

  /* Modal Edición */
  #edit-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 700; align-items: center; justify-content: center; }
  #edit-modal.visible { display: flex; }
  #edit-box { background: var(--surface); border-radius: 14px; padding: 20px; width: 85vw; display: flex; flex-direction: column; gap: 12px; }
  #edit-box label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
  #edit-box input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-size: 16px; outline: none; }
  #edit-actions { display: flex; flex-direction: column; gap: 8px; }
  .edit-btn-row { display: flex; gap: 8px; }
  #edit-actions button { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; cursor: pointer; }
  #edit-confirm { background: var(--accent); color: var(--bg); font-weight: 600; }
  #edit-reset { background: none; color: #a65d5d; border-color: #a65d5d; }
</style>
</head>
<body>

<div class="header">
  <button id="log-btn" class="header-btn">📋</button>
  <h1>Comunicación</h1>
  <div>
    <button id="staff-btn" class="header-btn">🧑‍⚕️</button>
    <button id="tts-btn" class="header-btn">🔇</button>
    <button id="nursing-btn" class="header-btn">✅</button>
  </div>
</div>

<div class="grid">
  <div class="btn" data-key="btn0"></div>
  <div class="btn" data-key="btn1"></div>
  <div class="btn si" data-key="btn2"></div>
  <div class="btn no" data-key="btn3"></div>
  <div class="btn" data-key="btn4"></div>
  <div class="btn" data-key="btn5"></div>
  <div id="attention-btn" class="btn timbre">Timbre</div>
  <div class="btn" data-key="btn7"></div>
</div>

<div class="custom-area">
  <input id="custom-input" type="text" placeholder="Escribí acá…" maxlength="200">
  <button id="send-custom">→</button>
</div>

<div id="log-panel" class="panel">
  <div class="panel-header"><span>Historial</span><button class="panel-close" id="log-close">✕</button></div>
  <div id="log-list"></div>
  <div class="log-actions">
    <button id="log-clear">Borrar Todo</button>
    <button id="log-export">Exportar CSV</button>
  </div>
</div>

<div id="nursing-panel" class="panel">
  <div class="panel-header"><span>Enfermería</span><button class="panel-close" id="nursing-close">✕</button></div>
  <div class="nursing-grid">
    <div class="btn nursing-opt">Enfermería general</div>
    <div class="btn nursing-opt">Baño / Higiene</div>
    <div class="btn nursing-opt">Controles</div>
    <div class="btn nursing-opt">Posición</div>
    <div class="btn nursing-opt">Muestra</div>
    <div class="btn nursing-opt">Medicación</div>
    <div class="btn nursing-opt">Suero / Vía</div>
    <div class="btn nursing-opt">Signos</div>
  </div>
</div>

<div id="staff-panel" class="panel">
  <div class="panel-header"><span>Registro Profesionales</span><button class="panel-close" id="staff-close">✕</button></div>
  <div class="staff-input-area">
    <input id="staff-name" type="text" placeholder="Nombre del profesional...">
  </div>
  <div class="nursing-grid">
    <div class="btn staff-btn-opt">Médico</div>
    <div class="btn staff-btn-opt">Residente</div>
    <div class="btn staff-btn-opt">Kinesiología</div>
    <div class="btn staff-btn-opt">Enfermería</div>
    <div class="btn staff-btn-opt">Fonoaudiología</div>
    <div class="btn staff-btn-opt">Nutrición</div>
    <div class="btn staff-btn-opt">Cirugía</div>
    <div class="btn staff-btn-opt">Jefatura Terapia</div>
  </div>
</div>

<div id="overlay">
  <div id="overlay-text"></div>
</div>

<div id="edit-modal">
  <div id="edit-box">
    <label>Editar botón</label>
    <input id="edit-input" type="text" maxlength="80">
    <div id="edit-actions">
        <div class="edit-btn-row">
            <button id="edit-cancel" style="background:none; color:var(--muted);">Cancelar</button>
            <button id="edit-confirm">Guardar</button>
        </div>
        <button id="edit-reset">Restaurar original</button>
    </div>
  </div>
</div>

<script>
  const DEFAULTS = {
    btn0: { label: '¿Cómo te llamás?', msg: '¿Cómo te llamás?' },
    btn1: { label: '¿Qué vas a hacer?', msg: '¿Qué vas a hacer?' },
    btn2: { label: 'SÍ', msg: 'SÍ' },
    btn3: { label: 'NO', msg: 'NO' },
    btn4: { label: 'Kinesióloga', msg: '¿Podés llamar a la kinesióloga?' },
    btn5: { label: 'Médico', msg: '¿Podés llamar al médico?' },
    btn7: { label: 'No sé / Tal vez', msg: 'No sé / Tal vez' }
  };

  let session = JSON.parse(localStorage.getItem('comm-btns') || '{}');
  let ttsEnabled = false;

  function updateButtons() {
    document.querySelectorAll('.btn[data-key]').forEach(btn => {
      const k = btn.dataset.key;
      const d = session[k] || DEFAULTS[k];
      if(d) {
        btn.textContent = d.label;
        btn.dataset.msg = d.msg;
      }
    });
  }
  updateButtons();

  // TTS Logic
  const ttsBtn = document.getElementById('tts-btn');
  ttsBtn.addEventListener('click', () => {
    ttsEnabled = !ttsEnabled;
    ttsBtn.textContent = ttsEnabled ? '🔊' : '🔇';
    ttsBtn.classList.toggle('active', ttsEnabled);
  });

  function hablar(texto) {
    if (ttsEnabled && 'speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const m = new SpeechSynthesisUtterance(texto);
      m.lang = 'es-AR';
      window.speechSynthesis.speak(m);
    }
  }

  // --- HISTORIAL ---
  let log = [];
  let logNuevo = localStorage.getItem('comm-log-v2');
  let logViejo = localStorage.getItem('comm-log');

  if (logNuevo) {
    log = JSON.parse(logNuevo);
  } else if (logViejo) {
    let parsedViejo = JSON.parse(logViejo);
    log = parsedViejo.map(e => ({
      msg: e.msg,
      resp: e.response || null,
      time: (e.date ? e.date + ' ' : '') + e.time,
      type: e.nursing ? 'nursing' : 'general'
    }));
    localStorage.setItem('comm-log-v2', JSON.stringify(log));
  }

  function addLog(msg, type = 'general') {
    const now = new Date();
    const time = now.toLocaleDateString('es-AR') + ' ' + now.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
    log.unshift({msg, resp: null, time, type});
    localStorage.setItem('comm-log-v2', JSON.stringify(log));
  }

  function renderLog() {
    const list = document.getElementById('log-list');
    if (!log.length) {
        list.innerHTML = '<div style="color:var(--muted);font-size:14px;text-align:center;margin-top:20px;">No hay mensajes registrados aún.</div>';
        return;
    }
    list.innerHTML = log.map(e => {
      let classType = '';
      if(e.type === 'nursing' || e.isNursing) classType = 'nursing';
      if(e.type === 'staff') classType = 'staff';
      
      return `
      <div class="log-entry ${classType}">
        <div class="log-time">${e.time}</div>
        <div>${e.msg}</div>
        ${e.resp ? `<div class="log-response">↩ ${e.resp}</div>` : ''}
      </div>`
    }).join('');
  }

  // Overlay Management
  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlay-text');

  function showMessage(msg) {
    overlayText.textContent = msg;
    overlay.classList.add('visible');
    hablar(msg);
    addLog(msg, 'general');
    
    // Autocierre después de 3.5 segundos si no lo tocan
    setTimeout(() => {
      if(overlayText.textContent === msg) {
        overlay.classList.remove('visible');
      }
    }, 3500);
  }

  overlay.addEventListener('click', () => {
    overlay.classList.remove('visible');
  });

  // Botones principales
  document.querySelectorAll('.btn[data-key]').forEach(btn => {
    let timer;
    btn.addEventListener('pointerdown', () => { timer = setTimeout(() => openEdit(btn), 800); });
    btn.addEventListener('pointerup', () => clearTimeout(timer));
    btn.addEventListener('pointercancel', () => clearTimeout(timer));
    btn.addEventListener('click', () => {
        showMessage(btn.dataset.msg);
    });
  });

  // Custom Input
  const customIn = document.getElementById('custom-input');
  function sendCustom() {
    const v = customIn.value.trim();
    if(v) {
      showMessage(v);
      customIn.value = "";
      customIn.blur(); // Oculta teclado
    }
  }
  document.getElementById('send-custom').addEventListener('click', sendCustom);
  customIn.addEventListener('keydown', e => { if(e.key === 'Enter') sendCustom(); });

  // Timbre
  document.getElementById('attention-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start();
    osc.stop(ctx.currentTime + 0.5);
  });

  // Paneles
  document.getElementById('log-btn').addEventListener('click', () => { renderLog(); document.getElementById('log-panel').classList.add('visible'); });
  document.getElementById('log-close').addEventListener('click', () => document.getElementById('log-panel').classList.remove('visible'));
  document.getElementById('log-clear').addEventListener('click', () => { log = []; localStorage.removeItem('comm-log-v2'); renderLog(); });
  
  // Exportar Historial
  document.getElementById('log-export').addEventListener('click', () => {
    if (!log.length) return;
    const rows = [['Fecha y Hora', 'Mensaje', 'Respuesta (Antigua)', 'Tipo de Registro']];
    log.forEach(e => {
      let tipoTexto = 'General';
      if(e.type === 'nursing' || e.isNursing) tipoTexto = 'Enfermería';
      if(e.type === 'staff') tipoTexto = 'Staff Profesional';
      rows.push([e.time, e.msg, e.resp || '', tipoTexto]);
    });
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'historial-comunicacion-' + new Date().toLocaleDateString('es-AR').replace(/\//g,'-') + '.csv';
    a.click();
    URL.revokeObjectURL(url);
  });

  // Panel Enfermería
  document.getElementById('nursing-btn').addEventListener('click', () => document.getElementById('nursing-panel').classList.add('visible'));
  document.getElementById('nursing-close').addEventListener('click', () => document.getElementById('nursing-panel').classList.remove('visible'));
  document.querySelectorAll('.nursing-opt').forEach(b => {
    b.addEventListener('click', () => {
      addLog(b.textContent, 'nursing');
      hablar(b.textContent);
      document.getElementById('nursing-panel').classList.remove('visible');
    });
  });

  // Panel Profesionales / Staff
  const staffNameInput = document.getElementById('staff-name');
  document.getElementById('staff-btn').addEventListener('click', () => { 
    staffNameInput.value = ''; // Limpiamos al abrir
    document.getElementById('staff-panel').classList.add('visible'); 
  });
  document.getElementById('staff-close').addEventListener('click', () => {
    document.getElementById('staff-panel').classList.remove('visible');
    staffNameInput.blur();
  });
  
  document.querySelectorAll('.staff-btn-opt').forEach(b => {
    b.addEventListener('click', () => {
      const nom = staffNameInput.value.trim();
      const especialidad = b.textContent;
      const mensajeFinal = nom ? `Atención ${especialidad}: ${nom}` : `Atención ${especialidad}`;
      
      addLog(mensajeFinal, 'staff');
      document.getElementById('staff-panel').classList.remove('visible');
      staffNameInput.blur(); // Ocultamos el teclado
      
      // Opcional: Mostramos en pantalla unos segundos como confirmación visual
      overlayText.textContent = "Registrado: " + mensajeFinal;
      overlay.classList.add('visible');
      setTimeout(() => overlay.classList.remove('visible'), 2000);
    });
  });

  // Edición
  const editModal = document.getElementById('edit-modal');
  const editInput = document.getElementById('edit-input');
  let targetBtn = null;

  function openEdit(btn) {
    targetBtn = btn;
    editInput.value = btn.textContent;
    editModal.classList.add('visible');
  }

  document.getElementById('edit-confirm').addEventListener('click', () => {
    const v = editInput.value.trim();
    if(v && targetBtn) {
      session[targetBtn.dataset.key] = { label: v, msg: v };
      localStorage.setItem('comm-btns', JSON.stringify(session));
      updateButtons();
    }
    editModal.classList.remove('visible');
  });

  document.getElementById('edit-reset').addEventListener('click', () => {
    if(targetBtn) {
      delete session[targetBtn.dataset.key];
      localStorage.setItem('comm-btns', JSON.stringify(session));
      updateButtons();
    }
    editModal.classList.remove('visible');
  });

  document.getElementById('edit-cancel').addEventListener('click', () => editModal.classList.remove('visible'));

</script>
</body>
</html>
