<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<title>Comunicación</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Source+Sans+3:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f0e;
    --surface: #1a1d1b;
    --border: #2e3330;
    --text: #e8ede9;
    --muted: #7a8a7e;
    --accent: #c8d8c2;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 8px;
    touch-action: manipulation;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  #log-btn {
    position: absolute;
    right: 0;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    -webkit-tap-highlight-color: transparent;
  }

  #log-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    flex-direction: column;
    padding: 16px;
    gap: 10px;
  }

  #log-panel.visible { display: flex; }

  #log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    flex-shrink: 0;
  }

  #log-header span {
    font-family: 'Lora', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #log-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #log-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .log-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    line-height: 1.4;
  }

  .log-time {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 2px;
  }

  #log-clear {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 13px;
    padding: 10px;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    flex: 1;
    min-height: 0;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 0 12px;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    line-height: 1.3;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .btn:active {
    background: #252a27;
    border-color: var(--accent);
  }

  .custom-area {
    display: flex;
    gap: 8px;
    align-items: stretch;
    flex-shrink: 0;
    height: 64px;
  }

  .custom-area input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    line-height: 1.4;
  }

  .custom-area input:focus { border-color: var(--accent); }
  .custom-area input::placeholder { color: var(--muted); }

  .custom-area button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--accent);
    font-size: 22px;
    padding: 0 18px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #0a0c0b;
    z-index: 100;
  }

  #overlay.visible { display: block; }

  #overlay-text {
    font-family: 'Lora', serif;
    font-size: clamp(32px, 8vw, 64px);
    color: #e8ede9;
    text-align: center;
    line-height: 1.3;
    letter-spacing: 0.01em;
    max-width: 90vw;
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
  }

  #overlay-response {
    display: none;
    position: absolute;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%);
    width: 85vw;
    gap: 8px;
    flex-direction: column;
    align-items: stretch;
  }

  #overlay-response.visible { display: flex; }

  #overlay-response input {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 18px;
    padding: 14px 16px;
    outline: none;
    text-align: center;
  }

  #overlay-response input::placeholder { color: var(--muted); }

  #overlay-response-answer {
    font-family: 'Lora', serif;
    font-size: clamp(28px, 7vw, 56px);
    color: var(--accent);
    text-align: center;
    line-height: 1.3;
    min-height: 60px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Comunicación</h1>
  <button id="log-btn" title="Historial">📋</button>
</div>

<div class="grid">
  <div class="btn" data-msg="¿Cómo te llamás?">¿Cómo te llamás?</div>
  <div class="btn" data-msg="¿Qué vas a hacer?">¿Qué vas a hacer?</div>
  <div class="btn" data-msg="¿Podés llamar a la kinesióloga?">Llamar a kinesióloga</div>
  <div class="btn" data-msg="¿Podés llamar al médico?">Llamar al médico</div>
  <div class="btn" data-msg="¿Cómo ves todo?">¿Cómo ves todo?</div>
  <div class="btn" data-msg="Necesito ayuda">Necesito ayuda</div>
  <div class="btn" data-msg="Tengo dolor">Tengo dolor</div>
  <div class="btn" data-msg="Tengo frío / calor">Frío / Calor</div>
  <div class="btn" data-msg="Necesito agua">Necesito agua</div>
  <div class="btn" data-msg="Necesito ir al baño">Baño</div>
</div>

<div class="custom-area">
  <input id="custom-input" type="text" placeholder="Mensaje personalizado…" maxlength="200">
  <button id="send-custom">→</button>
</div>

<div id="log-panel">
  <div id="log-header">
    <span>Historial</span>
    <button id="log-close">✕</button>
  </div>
  <div id="log-list"></div>
  <button id="log-clear">Borrar historial</button>
</div>

<div id="overlay">
  <div id="overlay-text"></div>
  <div id="overlay-response">
    <div id="overlay-response-answer"></div>
    <input id="overlay-response-input" type="text" placeholder="Escribí la respuesta…" maxlength="100">
  </div>
</div>

<script>
  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlay-text');
  const customInput = document.getElementById('custom-input');

  const logPanel = document.getElementById('log-panel');
  const logList = document.getElementById('log-list');
  let log = JSON.parse(localStorage.getItem('comm-log') || '[]');

  function saveLog() {
    localStorage.setItem('comm-log', JSON.stringify(log));
  }

  function addLog(msg) {
    const now = new Date();
    const time = now.toLocaleTimeString('es-AR', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
    const date = now.toLocaleDateString('es-AR');
    log.unshift({msg, time, date});
    saveLog();
  }

  function renderLog() {
    logList.innerHTML = log.length === 0
      ? '<div style="color:var(--muted);font-size:13px;text-align:center;margin-top:20px">Sin actividad aún</div>'
      : log.map(e => `<div class="log-entry"><div class="log-time">${e.date} ${e.time}</div>${e.msg}</div>`).join('');
  }

  document.getElementById('log-btn').addEventListener('click', () => {
    renderLog();
    logPanel.classList.add('visible');
  });

  document.getElementById('log-close').addEventListener('click', () => {
    logPanel.classList.remove('visible');
  });

  document.getElementById('log-clear').addEventListener('click', () => {
    log = [];
    saveLog();
    renderLog();
  });

  const overlayResponse = document.getElementById('overlay-response');
  const overlayResponseInput = document.getElementById('overlay-response-input');
  const overlayResponseAnswer = document.getElementById('overlay-response-answer');

  const RESPONSE_MSGS = ['¿Cómo te llamás?', '¿Qué vas a hacer?'];

  function showMessage(msg, isCustom) {
    addLog(msg);
    overlayText.textContent = msg;
    overlayText.classList.toggle('custom', !!isCustom);
    overlay.classList.add('visible');
    customInput.blur();

    if (RESPONSE_MSGS.includes(msg)) {
      overlayResponseAnswer.textContent = '';
      overlayResponseInput.value = '';
      overlayResponse.classList.add('visible');
      setTimeout(() => overlayResponseInput.focus(), 100);
    } else {
      overlayResponse.classList.remove('visible');
    }
  }

  overlayResponseInput.addEventListener('input', () => {
    overlayResponseAnswer.textContent = overlayResponseInput.value;
  });

  overlayResponseInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const val = overlayResponseInput.value.trim();
      if (val) addLog('↩ ' + val);
      hideOverlay();
    }
  });

  // Prevent overlay click-to-close when tapping input
  overlayResponseInput.addEventListener('click', e => e.stopPropagation());

  function hideOverlay() {
    overlay.classList.remove('visible');
    customInput.value = '';
    customInput.focus();
  }

  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', () => showMessage(btn.dataset.msg));
  });

  overlay.addEventListener('click', hideOverlay);

  function sendCustom() {
    const val = customInput.value.trim();
    if (val) showMessage(val, true);
  }

  document.getElementById('send-custom').addEventListener('click', sendCustom);

  customInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendCustom();
    }
  });
</script>
</body>
</html>
